{% extends "base.html" %} {% block config %}
<script>
      var search = {
        transform: function (query) {
          query = query + " astopwordflagbylorenzo"; // Trigger stop-word mechanism
          return query
            .replace(/(?:^|\s+)[*+-:^~]+(?=\s+|$)/g, "")
            .trim()
            .replace(/\s+|\b$/g, "* ");
        },
      };
    {% if "universities/" in page.url %}
    function onDomReady(callback) {
      if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', callback, { once: true });
      } else {
          callback();
      }
  }
  onDomReady(() => {
    const idTimeMap = Object.fromEntries(
        [...document.querySelectorAll('blockquote + details li')]
          .map(li => {
            const text = li.textContent.trim();
            const id = text.match(/A\d+/)?.[0];
            const time = text.match(/\((.*?)\)/)?.[1];
            return id && time ? [id, time] : null;
          })
          .filter(Boolean)
      );

      const makeIdSpan = (id, time) =>
        `<span class="id-link" data-id=${id} title="回答时间: ${time} (右键反馈问题)" style="text-decoration: underline dotted #aaa ; cursor: help ; font-family: monospace ;">${id}</span>`;

      document.querySelectorAll('h2[id^="q"] + ul').forEach(ul => {
        const lis = [...ul.querySelectorAll('li')];
        if (!lis.length) return;

        const groupsMap = new Map();

        for (const li of lis) {
          const text = li.textContent.trim();
          const idMatch = text.match(/A\d+/);
          const id = idMatch ? idMatch[0] : null;
          // 提取核心答案
          const answer = text.split(/[:：]\s*/).slice(1).join(':').trim() || text;

          if (!groupsMap.has(answer)) {
            groupsMap.set(answer, []);
          }
          groupsMap.get(answer).push(id);
        }

        ul.replaceChildren(
          ...Array.from(groupsMap.entries()).map(([answer, ids]) => {
            if (ids.length === 1) {
              // 单个回答：保持原样，但处理 ID 样式
              const li = document.createElement('li');
              const time = idTimeMap[ids[0]];
              const content = answer;
              li.innerHTML = ids[0] ? `${makeIdSpan(ids[0], time)}: ${content}` : content;
              return li;
            }

            // 多个重复回答：折叠并平铺 ID
            const li = document.createElement('li');
            const details = document.createElement('details');
            const summary = document.createElement('summary');
            const idContainer = document.createElement('div');

            summary.textContent = `${answer} × ${ids.length}`;
            summary.style.cssText = 'cursor:pointer;font-weight:bold;color:#007BFF;padding:2px 40px;';
            // 生成所有 ID 的 Span
            idContainer.innerHTML = ids
              .map(id => (idTimeMap[id] ? makeIdSpan(id, idTimeMap[id]) : id))
              .join(' ');

            details.append(summary, idContainer);
            li.append(details);
            return li;
          })
        );
      });

      document.addEventListener('contextmenu', e => {
        const el = e.target.closest('.id-link');
        if (!el) return;
        e.preventDefault();
        const id = el.dataset.id;
        window.open(
          `https://github.com/CollegesChat/university-information/issues/new?template=malicious_data.yml&title=${encodeURIComponent(`[数据举报]：${id}`)}`,
          '_blank'
        );
      });});
    {% endif %}
</script>
{% endblock %}
